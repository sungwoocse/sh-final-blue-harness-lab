apiVersion: v1
kind: ServiceAccount
metadata:
  name: kwasm-annotator
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kwasm-annotator
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kwasm-annotator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kwasm-annotator
subjects:
- kind: ServiceAccount
  name: kwasm-annotator
  namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kwasm-annotator
  namespace: kube-system
  labels:
    app: kwasm-annotator
spec:
  selector:
    matchLabels:
      app: kwasm-annotator
  template:
    metadata:
      labels:
        app: kwasm-annotator
    spec:
      serviceAccountName: kwasm-annotator
      tolerations:
      - operator: Exists
      containers:
      - name: annotator
        image: bitnami/kubectl:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          kubectl annotate node $NODE_NAME kwasm.sh/kwasm-node=true --overwrite
          echo "Annotation added to $NODE_NAME"
          sleep infinity
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 32Mi
